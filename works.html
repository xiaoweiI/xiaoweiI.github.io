<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works — Pumpkin Scone Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2EDE8;
            --bg-alt: #EBE4DC;
            --primary: #B8A99A;
            --accent: #C4A882;
            --green: #A3B5A6;
            --purple: #B5A8C0;
            --pink: #D9A8A8;
            --text: #5C5249;
            --text-light: #8A7E74;
            --card-bg: #F7F3EF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Theme transition: applied briefly on theme swap so color changes animate smoothly
           without interfering with normal per-element hover transitions afterwards. */
        body.theming,
        body.theming *:not(img):not(video) {
            transition:
                background-color 0.55s ease,
                color 0.55s ease,
                border-color 0.55s ease,
                box-shadow 0.55s ease,
                fill 0.55s ease,
                stroke 0.55s ease !important;
        }

        /* Pixel Roof */
        .pixel-roof {
            position: relative;
            width: 100%;
            height: 28px;
            background: var(--accent);
            z-index: 10;
            overflow: hidden;
        }
        .pixel-roof::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: rgba(255,255,255,0.2);
        }
        .pixel-roof::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; right: 0; height: 4px;
            background: rgba(0,0,0,0.1);
        }
        .roof-nails {
            position: absolute; inset: 0;
            background: radial-gradient(circle, var(--text) 2px, transparent 2px);
            background-size: 28px 28px;
            background-position: 14px 12px;
        }

        /* Nav */
        .nav {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(242,237,232,0.92);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--primary);
            padding: 14px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .nav-brand {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-decoration: none;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            color: var(--text-light);
            letter-spacing: 2px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active { color: var(--accent); }

        .lang-toggle {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            padding: 8px 12px;
            letter-spacing: 1px;
            background: transparent;
            color: var(--text);
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .lang-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* Page Header (centered) */
        .page-header {
            text-align: center;
            padding: 80px 48px 24px;
        }
        .page-header h1 {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 4px;
            margin-bottom: 16px;
            text-shadow: 4px 4px 0 rgba(196,168,130,0.2);
        }
        .page-header p {
            color: var(--text-light);
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        /* Layout */
        .works-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 48px 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
            align-items: start;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 80px;
            background: var(--card-bg);
            border: 3px solid var(--primary);
            box-shadow: 4px 4px 0 0 var(--primary);
            padding: 24px 20px;
        }
        .sidebar-title {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 2px;
            padding-bottom: 14px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--bg-alt);
        }
        .sidebar-group { margin-bottom: 18px; }
        .sidebar-group:last-child { margin-bottom: 0; }
        .group-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            color: var(--text);
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding: 0 8px;
        }
        .group-label .pixel-icon {
            width: 10px; height: 10px;
            background: var(--accent);
            box-shadow: 2px 0 0 var(--accent), 0 2px 0 var(--accent), -2px 0 0 var(--accent), 0 -2px 0 var(--accent);
        }
        .subgroup-label {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.4rem;
            color: var(--text-light);
            letter-spacing: 2px;
            padding: 4px 12px;
            margin-top: 6px;
            opacity: 0.8;
        }
        .sidebar-empty {
            font-size: 0.85rem;
            color: var(--text-light);
            text-align: center;
            padding: 20px 12px;
            display: none;
        }
        .sidebar-empty.show { display: block; }

        /* Main empty state */
        .main-empty {
            border: 3px dashed var(--primary);
            padding: 80px 40px;
            text-align: center;
            background: var(--card-bg);
        }
        .main-empty h2 {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-shadow: 3px 3px 0 rgba(196,168,130,0.2);
        }
        .main-empty p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.8;
            max-width: 420px;
            margin: 0 auto;
        }
        .main-empty .pixel-dots {
            display: inline-flex;
            gap: 8px;
            margin-top: 24px;
        }
        .main-empty .pixel-dots span {
            width: 10px; height: 10px;
            background: var(--accent);
            animation: pulse-dot 1.4s infinite;
        }
        .main-empty .pixel-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--primary); }
        .main-empty .pixel-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--green); }
        @keyframes pulse-dot {
            0%,100% { opacity: 0.3; transform: translateY(0); }
            50%     { opacity: 1;   transform: translateY(-4px); }
        }
        .sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: var(--text);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }
        .sidebar-item:hover {
            background: var(--bg-alt);
            border-color: var(--primary);
        }
        .sidebar-item.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 3px 3px 0 0 var(--text);
        }
        .sidebar-item .platform-icons {
            display: flex;
            gap: 4px;
            font-size: 0.7rem;
        }
        .plat {
            display: inline-block;
            width: 14px; height: 14px;
            background: var(--primary);
            opacity: 0.7;
        }
        .plat.pc     { background: var(--accent); }
        .plat.mobile { background: var(--pink); }
        .plat.mc     { background: var(--green); }
        .plat.world  { background: var(--purple); }
        .plat.web    { background: #9BB5C4; }
        .sidebar-item.active .plat { opacity: 1; }

        /* Main */
        .main {
            min-width: 0;
        }
        .work-hero {
            position: relative;
            background: var(--pink);
            aspect-ratio: 21/9;
            border: 3px solid var(--primary);
            box-shadow: 6px 6px 0 0 var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .work-hero.game-hero   { background: var(--accent); }
        .work-hero.mod-hero    { background: var(--purple); }
        .work-hero.world-hero  { background: var(--purple); }
        .work-hero.mc-hero     { background: var(--green); }
        .work-hero.web-hero    { background: #9BB5C4; }
        .work-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .work-hero .placeholder {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 3px;
        }
        .work-hero .platform-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            color: var(--text);
            letter-spacing: 1px;
            padding: 10px 14px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            z-index: 2;
        }

        .work-title {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .work-subtitle {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        .work-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 36px;
        }
        .work-tag {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.45rem;
            padding: 8px 14px;
            background: rgba(196,168,130,0.15);
            color: var(--accent);
            letter-spacing: 1px;
            border: 2px solid var(--accent);
        }
        .work-status {
            display: inline-block;
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.45rem;
            padding: 6px 12px;
            letter-spacing: 1px;
            border: 2px solid var(--primary);
            color: var(--text-light);
            margin-bottom: 20px;
        }
        .work-status.dev      { border-color: var(--accent); color: var(--accent); background: rgba(196,168,130,0.15); }
        .work-status.planned  { border-color: var(--purple); color: var(--purple); background: rgba(181,168,192,0.15); }
        .work-status.ongoing  { border-color: var(--primary); color: var(--text-light); }
        .work-status.released { border-color: var(--green);   color: var(--green);   background: rgba(163,181,166,0.15); }

        .work-desc {
            color: var(--text);
            line-height: 1.9;
            font-size: 0.95rem;
            margin-bottom: 36px;
            max-width: 720px;
        }

        /* Screenshots */
        .section-sub {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .section-sub .dot {
            width: 10px; height: 10px;
            background: var(--accent);
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .screenshot-grid.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 560px; }
        .screenshot {
            aspect-ratio: 4/5;
            background: var(--pink);
            border: 3px solid var(--primary);
            box-shadow: 4px 4px 0 0 var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            overflow: hidden;
        }
        .screenshot.phone { aspect-ratio: 9/19; }
        .screenshot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .screenshot-grid > .screenshot:nth-child(2) { background: #E8B8B8; }
        .screenshot-grid > .screenshot:nth-child(3) { background: #C99898; }

        /* Footer */
        footer {
            border-top: 3px solid var(--primary);
            padding: 32px 48px;
            text-align: center;
        }
        footer p {
            font-family: 'Press Start 2P', 'Noto Sans SC', cursive;
            font-size: 0.5rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            .works-layout {
                grid-template-columns: 1fr;
                padding: 24px 24px 64px;
            }
            .sidebar { position: static; }
        }
        @media (max-width: 768px) {
            .nav { padding: 12px 20px; }
            .nav-links { gap: 14px; }
            .nav-links a { font-size: 0.4rem; }
            .lang-toggle { font-size: 0.4rem; padding: 6px 10px; }
            .page-header { padding: 48px 24px 16px; }
            .page-header h1 { font-size: 1.2rem; }
            .work-title { font-size: 1rem; }
            .screenshot-grid, .screenshot-grid.cols-2 { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="pixel-roof">
        <div class="roof-nails"></div>
    </div>

    <nav class="nav">
        <a href="index.html" class="nav-brand">PUMPKIN SCONE</a>
        <div class="nav-right">
            <div class="nav-links" id="nav-links"></div>
            <button class="lang-toggle" id="lang-toggle"></button>
        </div>
    </nav>

    <header class="page-header">
        <h1 id="page-title"></h1>
        <p id="page-subtitle"></p>
    </header>

    <div class="works-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <h2 class="sidebar-title" id="sidebar-title"></h2>
            <div id="sidebar-groups"></div>
            <p class="sidebar-empty" id="sidebar-empty"></p>
        </aside>

        <!-- Main -->
        <main class="main" id="main-content">
            <!-- filled by JS -->
        </main>

    </div>

    <footer>
        <p>&copy; 2025 PUMPKIN SCONE STUDIO</p>
    </footer>

    <script>
        // ============================================================
        //  i18n
        //  Any string field may be a plain string OR { en, zh } object.
        //  t(value) picks the right language.
        // ============================================================
        const LANG_KEY = 'ps_lang';
        let lang = localStorage.getItem(LANG_KEY) || 'en';

        function t(val) {
            if (val == null) return '';
            if (typeof val === 'string') return val;
            return val[lang] ?? val.en ?? '';
        }

        const ui = {
            pageTitle:    { en: 'MY WORKS',                    zh: '我的作品' },
            pageSubtitle: { en: 'EVERY PROJECT, MADE WITH CARE', zh: '用心创作的每一个项目' },
            navWorks:      { en: 'WORKS',      zh: '作品' },
            navCategories: { en: 'CATEGORIES', zh: '分类' },
            navDevlog:     { en: 'DEVLOG',     zh: '开发日志' },
            navAbout:      { en: 'ABOUT',      zh: '关于' },
            sidebarTitle:  { en: 'DIRECTORY',  zh: '目录' },
            sidebarEmpty:  { en: 'Nothing here yet.', zh: '暂无作品' },
            screenshots:   { en: 'SCREENSHOTS', zh: '截图展示' },
            comingSoon:    { en: 'COMING SOON', zh: '即将上线' },
            comingSoonDesc: {
                en: "No works published yet. Projects across games, apps, websites, mods, Minecraft, and worldbuilding will appear here as they're added.",
                zh: '暂未发布任何作品。游戏、应用、网站、模组、Minecraft 和世界观内容将随着创作逐步上线。'
            },
            langBtn: { en: '中文', zh: 'EN' }
        };

        // ============================================================
        //  WORKS DATA
        //  Add a work by pushing an object into the matching `works: []`.
        //  Empty categories/subgroups are hidden automatically.
        //  Strings can be plain OR { en, zh } for bilingual content.
        // ============================================================
        const categories = [
            {
                label: { en: 'GAMES', zh: '游戏' },
                heroClass: 'game-hero',
                subgroups: [
                    { label: { en: 'PC',     zh: 'PC 端'  }, works: [] },
                    { label: { en: 'MOBILE', zh: '移动端' }, works: [] }
                ]
            },
            {
                label: { en: 'APPS', zh: '应用' },
                heroClass: '',
                works: [
                    {
                        id: 'carbcycle',
                        title: 'CarbCycle',
                        subtitle: {
                            en: 'Carb cycling diet tracker · iOS & Android',
                            zh: '碳循环饮食追踪应用 · iOS & Android'
                        },
                        platform: 'iOS · Android',
                        platIcons: ['mobile', 'mobile'],
                        tags: [
                            { en: 'MOBILE',       zh: '移动端'    },
                            { en: 'REACT NATIVE', zh: 'REACT NATIVE' },
                            { en: 'EXPO',         zh: 'EXPO'      },
                            { en: 'NUTRITION',    zh: '营养追踪'  },
                            { en: 'AI',           zh: 'AI'        },
                            { en: 'I18N',         zh: '三语本地化' }
                        ],
                        status: {
                            text: { en: 'IN DEVELOPMENT', zh: '开发中' },
                            cls: 'dev'
                        },
                        desc: {
                            en: "A React Native + Expo app for carb cycling diet tracking. Classify each day of the week as High / Medium / Low carb based on training intensity, and track protein, carbs, and fat against daily macro targets. Features a Today dashboard with SVG circular progress, plan-vs-eaten meal tracking, a 97-item localized food library, weight logging, and a dual-engine auto meal planner: an offline algorithm for reliability plus an AI generator (Claude / OpenAI / DeepSeek, bring-your-own-key). Unified Zustand state, full EN / ES / ZH internationalization down to food names and units, and a dark themed UI. Backend-free — everything is stored locally via AsyncStorage.",
                            zh: '基于 Expo + React Native 的碳循环饮食追踪应用。根据训练强度把一周分为高碳 / 中碳 / 低碳日，围绕这个模式完成每日蛋白 / 碳水 / 脂肪的目标设定与饮食追踪。功能包括 Today 仪表盘（SVG 圆环进度）、"计划 / 已吃"双态膳食记录、97 项多语言食物库、体重日志，以及双引擎自动膳食计划——离线算法保底 + AI 出菜谱（支持 Claude / OpenAI / DeepSeek，用户自带 API Key）。Zustand 持久化统一状态、完整的 EN / ES / ZH 三语本地化（食物名与单位也随语言切换）、深色主题设计。完全本地优先，所有数据走 AsyncStorage，无需后端。'
                        },
                        heroImg: 'Image/carbcycle/ChatGPT%20Image%202026%E5%B9%B44%E6%9C%8820%E6%97%A5%2020_19_12.png',
                        shots: [
                            { img: 'Image/carbcycle/%E6%88%AA%E5%9B%BE1.jpg', alt: 'CarbCycle screenshot 1' },
                            { img: 'Image/carbcycle/%E6%88%AA%E5%9B%BE2.jpg', alt: 'CarbCycle screenshot 2' }
                        ],
                        shotCols: 2,
                        shotClass: 'phone',
                        theme: {
                            'bg':         '#121212',
                            'bg-alt':     '#1A1A1A',
                            'card-bg':    '#1E1E1E',
                            'primary':    '#3A3A3A',
                            'accent':     '#FF9800',
                            'text':       '#F5F5F5',
                            'text-light': '#A0A0A0'
                        }
                    }
                ]
            },
            { label: { en: 'WEBSITES',  zh: '网站'     }, heroClass: 'web-hero',   works: [] },
            { label: { en: 'MODS',      zh: '模组'     }, heroClass: 'mod-hero',   works: [] },
            { label: { en: 'MINECRAFT', zh: '我的世界' }, heroClass: 'mc-hero',    works: [] },
            { label: { en: 'WORLD',     zh: '世界观'   }, heroClass: 'world-hero', works: [] }
        ];

        // ============================================================
        //  THEME
        //  Each work may carry a `theme` object that overrides the
        //  site's CSS custom properties. Applying a theme briefly adds
        //  a .theming class so every colored surface animates in sync.
        // ============================================================
        const THEMEABLE = ['bg','bg-alt','primary','accent','green','purple','pink','text','text-light','card-bg'];
        let themingTimer = null;

        function applyTheme(theme) {
            const root = document.documentElement.style;
            document.body.classList.add('theming');
            if (theme) {
                THEMEABLE.forEach(v => {
                    if (theme[v]) root.setProperty(`--${v}`, theme[v]);
                    else root.removeProperty(`--${v}`);
                });
            } else {
                THEMEABLE.forEach(v => root.removeProperty(`--${v}`));
            }
            clearTimeout(themingTimer);
            themingTimer = setTimeout(() => document.body.classList.remove('theming'), 650);
        }

        // ============================================================
        //  RENDER
        // ============================================================
        let worksIndex = {};
        let selectedId = null;

        function collectWorks(cat) {
            if (cat.subgroups) return cat.subgroups.flatMap(s => s.works);
            return cat.works || [];
        }

        function renderNav() {
            document.getElementById('nav-links').innerHTML = `
                <a href="works.html" class="active">${t(ui.navWorks)}</a>
                <a href="index.html#categories">${t(ui.navCategories)}</a>
                <a href="index.html#devlog">${t(ui.navDevlog)}</a>
                <a href="index.html#about">${t(ui.navAbout)}</a>
            `;
            document.getElementById('lang-toggle').textContent = t(ui.langBtn);
            document.getElementById('page-title').textContent = t(ui.pageTitle);
            document.getElementById('page-subtitle').textContent = t(ui.pageSubtitle);
            document.getElementById('sidebar-title').textContent = t(ui.sidebarTitle);
            document.getElementById('sidebar-empty').textContent = t(ui.sidebarEmpty);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-groups');
            const empty = document.getElementById('sidebar-empty');
            container.innerHTML = '';
            worksIndex = {};

            let total = 0;
            let firstId = null;

            categories.forEach(cat => {
                const catWorks = collectWorks(cat);
                if (catWorks.length === 0) return;

                const group = document.createElement('div');
                group.className = 'sidebar-group';
                const gl = document.createElement('div');
                gl.className = 'group-label';
                gl.innerHTML = `<span class="pixel-icon"></span>${t(cat.label)}`;
                group.appendChild(gl);

                if (cat.subgroups) {
                    cat.subgroups.forEach(sub => {
                        if (sub.works.length === 0) return;
                        const subLabel = document.createElement('div');
                        subLabel.className = 'subgroup-label';
                        subLabel.textContent = t(sub.label);
                        group.appendChild(subLabel);
                        sub.works.forEach(w => {
                            group.appendChild(makeItem(w, cat.heroClass));
                            worksIndex[w.id] = { ...w, heroClass: cat.heroClass };
                            total++;
                            if (!firstId) firstId = w.id;
                        });
                    });
                } else {
                    cat.works.forEach(w => {
                        group.appendChild(makeItem(w, cat.heroClass));
                        worksIndex[w.id] = { ...w, heroClass: cat.heroClass };
                        total++;
                        if (!firstId) firstId = w.id;
                    });
                }

                container.appendChild(group);
            });

            if (total === 0) {
                empty.classList.add('show');
                applyTheme(null);
                renderEmptyMain();
            } else {
                empty.classList.remove('show');
                const target = (selectedId && worksIndex[selectedId]) ? selectedId : firstId;
                select(target);
            }
        }

        function makeItem(work, heroClass) {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.dataset.id = work.id;
            const icons = (work.platIcons || []).map(p => `<span class="plat ${p}"></span>`).join('');
            item.innerHTML = `<span>${t(work.title)}</span><span class="platform-icons">${icons}</span>`;
            item.addEventListener('click', () => select(work.id));
            return item;
        }

        function select(id) {
            selectedId = id;
            document.querySelectorAll('.sidebar-item').forEach(i => {
                i.classList.toggle('active', i.dataset.id === id);
            });
            const w = worksIndex[id];
            applyTheme(w ? w.theme : null);
            renderMain(id);
        }

        function renderMain(id) {
            const w = worksIndex[id];
            if (!w) return;

            const heroInner = w.heroImg
                ? `<img src="${w.heroImg}" alt="${t(w.title)} key art">`
                : `<span class="placeholder">KEY ART</span>`;

            const shotsHtml = (w.shots || []).map(s => {
                if (typeof s === 'string') {
                    return `<div class="screenshot ${w.shotClass || ''}">${s}</div>`;
                }
                if (s.img) {
                    return `<div class="screenshot ${w.shotClass || ''}"><img src="${s.img}" alt="${s.alt || ''}"></div>`;
                }
                return `<div class="screenshot ${w.shotClass || ''}">${t(s.label || '')}</div>`;
            }).join('');

            const colsClass = w.shotCols === 2 ? 'cols-2' : '';

            document.getElementById('main-content').innerHTML = `
                <div class="work-hero ${w.heroClass || ''}">
                    ${heroInner}
                    <span class="platform-badge">${t(w.platform)}</span>
                </div>
                <span class="work-status ${w.status.cls}">${t(w.status.text)}</span>
                <h2 class="work-title">${t(w.title)}</h2>
                <p class="work-subtitle">${t(w.subtitle)}</p>
                <div class="work-tags">
                    ${(w.tags || []).map(tag => `<span class="work-tag">${t(tag)}</span>`).join('')}
                </div>
                <p class="work-desc">${t(w.desc)}</p>
                <div class="section-sub"><span class="dot"></span>${t(ui.screenshots)}</div>
                <div class="screenshot-grid ${colsClass}">
                    ${shotsHtml}
                </div>
            `;
        }

        function renderEmptyMain() {
            document.getElementById('main-content').innerHTML = `
                <div class="main-empty">
                    <h2>${t(ui.comingSoon)}</h2>
                    <p>${t(ui.comingSoonDesc)}</p>
                    <div class="pixel-dots"><span></span><span></span><span></span></div>
                </div>
            `;
        }

        function renderAll() {
            renderNav();
            renderSidebar();
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            lang = lang === 'en' ? 'zh' : 'en';
            localStorage.setItem(LANG_KEY, lang);
            renderAll();
        });

        renderAll();
    </script>

</body>
</html>
